const fb=()=>window.__FB;
const dbr=p=>fb().ref(fb().db,p);
const fGet=async p=>{try{const s=await fb().get(dbr(p));return s.exists()?s.val():null;}catch{return null;}};
const fSet=async(p,v)=>{try{await fb().set(dbr(p),v);}catch{}};
const fDel=async p=>{try{await fb().remove(dbr(p));}catch{}};
const fSub=(p,cb)=>{fb().onValue(dbr(p),s=>cb(s.exists()?s.val():null));return()=>{};};
const ls={g:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
const uid=()=>"id_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
const genPw=()=>{const w=["grace","gloire","amen","paix","joie","lumiere","force","foi","espoir","salem"];return w[Math.floor(Math.random()*w.length)]+(1000+Math.floor(Math.random()*9000));};
const gH=n=>(n||0).toLocaleString("fr-FR")+" G";
const finTot=d=>{if(!d?.finances)return{e:0,d:0};const e=(d.finances.entrees||[]).reduce((s,x)=>s+(+x.dimes||0)+(+x.offrandes||0)+(+x.dons||0),0);return{e,d:(d.finances.depenses||[]).reduce((s,x)=>s+(+x.montant||0),0)};};
const egVide=(nom="")=>({nom,membres:[],conversions:[],comites:[],ministeres:[],groupes:[],diacres:[],pasteurs:[],veuves:[],activites:{presentations:[],baptemes:[],evangelisations:[],missions:[],mariages:[],reveils:[],enterrements:[]},services:[],finances:{entrees:[],depenses:[]},localisation:{adresse:"",coordonnees:"",lienMaps:""}});

function imprimer(titre,html,eg=""){
  const w=window.open("","_blank","width=900,height=700");
  if(!w){alert("Activez les popups pour imprimer.");return;}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${titre}</title><style>body{font-family:Arial,sans-serif;padding:28px;color:#111;}h1{color:#8A6A28;border-bottom:3px solid #C9A84C;padding-bottom:10px;margin-bottom:18px;}h2{color:#162236;margin:16px 0 7px;font-size:14px;}table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:12px;}th{background:#162236;color:#C9A84C;padding:7px 10px;text-align:left;font-size:10px;letter-spacing:1px;}td{padding:7px 10px;border-bottom:1px solid #eee;}tr:nth-child(even){background:#f9f9f9;}.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;border-bottom:1px solid #ddd;padding-bottom:13px;}.ftr{margin-top:34px;padding-top:10px;border-top:1px solid #ddd;font-size:10px;color:#999;text-align:center;}</style></head><body><div class="hdr"><div><div style="font-size:19px;font-weight:bold;color:#8A6A28">✝ Les Églises Salem</div><div style="font-size:11px;color:#555;margin-top:3px">${eg}</div></div><div style="text-align:right;font-size:11px;color:#777"><div style="font-size:15px;font-weight:bold;color:#8A6A28">${titre}</div><div>Imprimé le ${new Date().toLocaleDateString("fr-FR")} à ${new Date().toLocaleTimeString("fr-FR")}</div><div>v${VER}</div></div></div>${html}<div class="ftr">Les Églises Salem — Système de gestion ecclésiastique v${VER}</div></body></html>`);
  w.document.close();setTimeout(()=>{w.focus();w.print();},600);
}
const htmlM=l=>!l?.length?"<p>Aucun enregistrement</p>":`<table><tr><th>Prénom</th><th>Nom</th><th>Sexe</th><th>Type</th><th>Position</th><th>Tél.</th><th>Email</th><th>État civil</th><th>Adresse</th></tr>${l.map(m=>`<tr><td>${m.prenom||""}</td><td>${m.nom||""}</td><td>${m.sexe||""}</td><td>${m.type==="baptise"?"Baptisé":"Croyant"}</td><td>${m.position||""}</td><td>${m.tel||""}</td><td>${m.email||""}</td><td>${m.etatCivil||""}</td><td>${m.adresse||""}</td></tr>`).join("")}</table>`;
const htmlP=l=>!l?.length?"<p>Aucun enregistrement</p>":`<table><tr><th>Prénom</th><th>Nom</th><th>Sexe</th><th>Position</th><th>Tél.</th><th>Email</th><th>État civil</th></tr>${l.map(p=>`<tr><td>${p.prenom||""}</td><td>${p.nom||""}</td><td>${p.sexe||""}</td><td>${p.position||""}</td><td>${p.tel||""}</td><td>${p.email||""}</td><td>${p.etatCivil||""}</td></tr>`).join("")}</table>`;
const htmlF=fin=>{const e=fin?.entrees||[];const d=fin?.depenses||[];const tE=e.reduce((s,x)=>s+(+x.dimes||0)+(+x.offrandes||0)+(+x.dons||0),0);const tD=d.reduce((s,x)=>s+(+x.montant||0),0);return`<h2>Entrées</h2><table><tr><th>Mois</th><th>Dîmes</th><th>Offrandes</th><th>Dons</th><th>Total</th></tr>${e.map(x=>`<tr><td>${x.mois||""}</td><td>${gH(+x.dimes)}</td><td>${gH(+x.offrandes)}</td><td>${gH(+x.dons)}</td><td><b>${gH((+x.dimes||0)+(+x.offrandes||0)+(+x.dons||0))}</b></td></tr>`).join("")}<tr style="background:#f0f0f0"><td><b>TOTAL</b></td><td colspan="3"></td><td><b>${gH(tE)}</b></td></tr></table><h2>Dépenses</h2><table><tr><th>Date</th><th>Description</th><th>Montant</th></tr>${d.map(x=>`<tr><td>${x.date||""}</td><td>${x.description||""}</td><td>${gH(+x.montant)}</td></tr>`).join("")}<tr style="background:#f0f0f0"><td colspan="2"><b>TOTAL</b></td><td><b>${gH(tD)}</b></td></tr></table><h2 style="color:#2EAA72">Solde : ${gH(tE-tD)}</h2>`;};

const iS={background:C.bg3,border:`1px solid ${C.gold}44`,borderRadius:8,color:C.w,padding:"9px 13px",fontSize:13,outline:"none",fontFamily:"Georgia,serif",width:"100%",boxSizing:"border-box"};
const lS={fontSize:10,color:C.gray,letterSpacing:1.2,marginBottom:5,display:"block",fontWeight:700};
const Inp=({label,name,value,onChange,type="text",placeholder=""})=><div style={{marginBottom:12}}>{label&&<label style={lS}>{label.toUpperCase()}</label>}<input type={type} name={name||""} value={value||""} onChange={onChange} placeholder={placeholder} style={iS} autoComplete="off"/></div>;
const Sel=({label,name,value,onChange,options})=><div style={{marginBottom:12}}>{label&&<label style={lS}>{label.toUpperCase()}</label>}<select name={name||""} value={value||""} onChange={onChange} style={{...iS,cursor:"pointer"}}><option value="">— Choisir —</option>{options.map(o=><option key={o}>{o}</option>)}</select></div>;

function Btn({children,onClick,v="gold",sm,full,disabled}){
  const s={gold:{bg:`linear-gradient(135deg,${C.gD},${C.gold})`,c:C.bg,b:"none"},outline:{bg:"transparent",c:C.gray,b:`1px solid ${C.gray}55`},danger:{bg:`${C.err}18`,c:C.err,b:`1px solid ${C.err}44`},blue:{bg:`linear-gradient(135deg,#1A4080,${C.blue})`,c:"#fff",b:"none"},green:{bg:`linear-gradient(135deg,#155530,${C.ok})`,c:"#fff",b:"none"},orange:{bg:`linear-gradient(135deg,#804020,${C.ora})`,c:"#fff",b:"none"}}[v]||{bg:`linear-gradient(135deg,${C.gD},${C.gold})`,c:C.bg,b:"none"};
  return<button onClick={onClick} disabled={disabled} style={{padding:sm?"5px 12px":"9px 18px",width:full?"100%":"auto",background:s.bg,color:s.c,border:s.b,borderRadius:9,fontWeight:800,fontSize:sm?11:13,cursor:disabled?"not-allowed":"pointer",fontFamily:"Georgia,serif",letterSpacing:.6,opacity:disabled?.5:1}}>{children}</button>;
}
const Modl=({title,sub,onClose,children,wide})=><div style={{position:"fixed",inset:0,zIndex:400,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(8px)"}}><div style={{background:C.bg2,border:`1px solid ${C.gold}66`,borderRadius:18,width:"95%",maxWidth:wide?780:540,maxHeight:"92vh",overflowY:"auto",padding:"22px 26px",boxShadow:`0 0 80px ${C.gold}18`}}><div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}><div><h3 style={{margin:0,color:C.gold,fontSize:15,fontWeight:800,letterSpacing:1}}>{title}</h3>{sub&&<div style={{fontSize:10,color:C.gray,marginTop:3}}>{sub}</div>}</div><button onClick={onClose} style={{background:"transparent",border:"none",color:C.gray,fontSize:21,cursor:"pointer",lineHeight:1}}>✕</button></div>{children}</div></div>;
const Card=({children,style={}})=><div style={{background:`linear-gradient(135deg,${C.bg3},${C.bg4})`,border:`1px solid ${C.gold}22`,borderRadius:14,...style}}>{children}</div>;
const SB=({label,value,icon,color=C.gold})=><div style={{display:"flex",alignItems:"center",gap:9,padding:"10px 13px",background:`${color}0D`,border:`1px solid ${color}28`,borderRadius:12,flex:1,minWidth:98}}><span style={{fontSize:16}}>{icon}</span><div><div style={{fontSize:15,fontWeight:800,color,lineHeight:1}}>{value}</div><div style={{fontSize:9,color:C.gray,marginTop:2}}>{label}</div></div></div>;
const SH=({children})=><h2 style={{margin:"0 0 14px",fontSize:16,fontWeight:800,color:C.gold,letterSpacing:1,borderBottom:`1px solid ${C.gold}33`,paddingBottom:9}}>{children}</h2>;
const G2=({children})=><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>{children}</div>;
const G3=({children})=><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 12px"}}>{children}</div>;
const CB=({online})=><div style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:20,background:online?`${C.ok}18`:`${C.ora}18`,border:`1px solid ${online?C.ok:C.ora}44`,fontSize:9,fontWeight:700,color:online?C.ok:C.ora}}><div style={{width:5,height:5,borderRadius:"50%",background:online?C.ok:C.ora}} className={online?"":"pulse"}/>{online?"☁ Synchronisé":"⚡ Hors ligne"}</div>;
const BP=({onClick})=><button onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"5px 11px",background:`${C.blue}18`,border:`1px solid ${C.blue}44`,borderRadius:8,color:C.blue,cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"inherit"}}>🖨 Imprimer</button>;
const BEdit=({onClick})=><button onClick={onClick} style={{padding:"4px 8px",background:`${C.gold}14`,border:`1px solid ${C.gold}44`,borderRadius:6,color:C.gold,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}} title="Modifier">✏</button>;
const BDel=({onClick})=><button onClick={onClick} style={{padding:"4px 8px",background:`${C.err}14`,border:`1px solid ${C.err}44`,borderRadius:6,color:C.err,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}} title="Supprimer">🗑</button>;

const ChampsC=({form,set})=>{const f=useCallback(e=>set(p=>({...p,[e.target.name]:e.target.value})),[set]);return<><div style={{borderTop:`1px solid ${C.gold}22`,margin:"6px 0 10px",paddingTop:10,fontSize:10,color:C.gold,fontWeight:700,letterSpacing:1}}>CONTACT & ÉTAT CIVIL</div><G3><Inp label="Téléphone" value={form.tel} name="tel" onChange={f} placeholder="509-XXXX-XXXX"/><Inp label="Email" value={form.email} name="email" onChange={f} type="email"/><Sel label="État civil" value={form.etatCivil} name="etatCivil" onChange={f} options={MATRI}/></G3><G2><Inp label="Personne à contacter" value={form.persContact} name="persContact" onChange={f}/><Inp label="Tél. contact" value={form.telContact} name="telContact" onChange={f} placeholder="509-XXXX-XXXX"/></G2></>;};

function useOnline(){const[on,setOn]=useState(navigator.onLine);useEffect(()=>{const a=()=>setOn(true);const b=()=>setOn(false);window.addEventListener("online",a);window.addEventListener("offline",b);return()=>{window.removeEventListener("online",a);window.removeEventListener("offline",b);};},[]);return on;}
function useEgData(egId){const[data,setD]=useState(null);const online=useOnline();useEffect(()=>{if(!egId)return;const c=ls.g("eg_"+egId);if(c)setD(c);const u=fSub("eglises/"+egId+"/data",v=>{const d=v||egVide();setD(d);ls.s("eg_"+egId,d);});return u;},[egId]);const save=useCallback(async nd=>{setD(nd);ls.s("eg_"+egId,nd);await fSet("eglises/"+egId+"/data",nd);},[egId]);return{data,save,online};}
function useMaster(){const[cfg,setCR]=useState(null);const online=useOnline();useEffect(()=>{const c=ls.g("m_cfg");if(c)setCR(c);const u=fSub("master",v=>{const d=v||{password:MPW,eglises:[]};setCR(d);ls.s("m_cfg",d);});return u;},[]);const saveCfg=useCallback(async nc=>{setCR(nc);ls.s("m_cfg",nc);await fSet("master",nc);},[]);return{cfg,saveCfg,online};}

function Splash(){return<div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><svg width="52" height="52" viewBox="0 0 52 52" fill="none"><rect x="21" y="4" width="10" height="44" rx="5" fill={C.gold}/><rect x="4" y="19" width="44" height="10" rx="5" fill={C.gold}/></svg><div style={{fontSize:19,fontWeight:800,color:C.gold,letterSpacing:3}}>LES ÉGLISES SALEM</div><div style={{display:"flex",alignItems:"center",gap:8,color:C.gray,fontSize:12}}><div style={{width:15,height:15,border:`2px solid ${C.gold}`,borderTopColor:"transparent",borderRadius:"50%"}} className="spin"/>Connexion au cloud...</div><div style={{fontSize:9,color:C.gray}}>v{VER}</div></div>;}

function Login({masterPw,egCfg,onMaster,onEglise}){
  const[pass,setPass]=useState("");const[show,setShow]=useState(false);const[err,setErr]=useState(false);
  const isEg=!!egCfg;
  const go=()=>{const ok=isEg?(pass===egCfg.password):(pass===masterPw);if(ok){isEg?onEglise():onMaster();}else{setErr(true);setTimeout(()=>setErr(false),2000);}};
  return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}><div style={{width:"100%",maxWidth:390,background:`linear-gradient(160deg,${C.bg2},${C.bg3})`,border:`1px solid ${C.gold}66`,borderRadius:22,padding:"40px 32px",boxShadow:`0 0 100px ${C.gold}15`,textAlign:"center"}}>
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style={{marginBottom:9}}><rect x="19" y="4" width="10" height="40" rx="5" fill={C.gold}/><rect x="4" y="17" width="40" height="10" rx="5" fill={C.gold}/></svg>
  {isEg?(<><div style={{fontSize:9,color:C.gray,letterSpacing:3,marginBottom:3}}>SYSTÈME DE GESTION</div>{egCfg.photo&&<img src={egCfg.photo} alt="" style={{width:64,height:64,borderRadius:12,objectFit:"cover",margin:"7px auto",display:"block",border:`2px solid ${C.gold}44`}}/>}<div style={{fontSize:17,fontWeight:800,color:C.gold,letterSpacing:2,marginBottom:4,lineHeight:1.2}}>{egCfg.nom}</div></>):(<><div style={{fontSize:9,color:C.gray,letterSpacing:3,marginBottom:3}}>PASTEUR RESPONSABLE</div><div style={{fontSize:10,color:C.gL2,letterSpacing:3,marginBottom:3}}>LES ÉGLISES DE DIEU</div><div style={{fontSize:22,fontWeight:800,color:C.gold,letterSpacing:4,marginBottom:4}}>SALEM</div></>)}
  <div style={{fontSize:9,color:C.gray,fontStyle:"italic",marginBottom:24,lineHeight:1.6}}>{VERSET}</div>
  <div style={{textAlign:"left",marginBottom:5}}><label style={lS}>{isEg?"MOT DE PASSE — ÉGLISE":"MOT DE PASSE — SYSTÈME MÈRE"}</label><div style={{position:"relative"}}><input type={show?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••" style={{...iS,border:`1px solid ${err?C.err:C.gold}55`,paddingRight:40,letterSpacing:3,fontSize:14,textAlign:"center"}}/><button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:C.gray,cursor:"pointer",fontSize:13}}>{show?"🙈":"👁"}</button></div></div>
  {err&&<div style={{color:C.err,fontSize:11,marginBottom:7,fontWeight:700}}>⚠ Mot de passe incorrect</div>}
  <button onClick={go} style={{width:"100%",marginTop:12,padding:"12px",background:`linear-gradient(135deg,${C.gD},${C.gold})`,color:C.bg,border:"none",borderRadius:10,fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif",letterSpacing:2,boxShadow:`0 5px 20px ${C.gold}28`,marginBottom:12}}>CONNEXION</button>
  {!isEg&&<div style={{fontSize:9,color:`${C.gray}88`}}>Mot de passe par défaut : <span style={{color:C.gold}}>pastoral2025</span> · v{VER}</div>}
  </div></div>;
}

function ChgPass({actuel,onSave,onClose}){
  const[a,setA]=useState("");const[n,setN]=useState("");const[c,setC]=useState("");const[err,setE]=useState("");const[ok,setOk]=useState(false);
  const go=()=>{if(a!==actuel){setE("Ancien mot de passe incorrect.");return;}if(n.length<6){setE("Minimum 6 caractères.");return;}if(n!==c){setE("Les mots de passe ne correspondent pas.");return;}onSave(n);setOk(true);};
  return<Modl title="Changer le mot de passe" onClose={onClose}>{ok?<div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:32,marginBottom:8}}>✅</div><div style={{color:C.ok,fontWeight:700,marginBottom:12}}>Mot de passe changé !</div><Btn onClick={onClose}>Fermer</Btn></div>
  :<><Inp label="Ancien mot de passe" value={a} onChange={e=>setA(e.target.value)} type="password"/><Inp label="Nouveau mot de passe" value={n} onChange={e=>setN(e.target.value)} type="password" placeholder="Minimum 6 caractères"/><Inp label="Confirmer" value={c} onChange={e=>setC(e.target.value)} type="password"/>{err&&<div style={{color:C.err,fontSize:11,marginBottom:8,fontWeight:700}}>⚠ {err}</div>}<div style={{display:"flex",gap:8,marginTop:6}}><Btn onClick={go}>✓ CHANGER</Btn><Btn onClick={onClose} v="outline">ANNULER</Btn></div></>}
  </Modl>;
}

function ModalLien({eg,onClose}){
  const base=window.location.href.replace(/[?#].*/,"");
  const lien=`${base}?eglise=${eg.id}`;
  const[c1,setC1]=useState(false);const[c2,setC2]=useState(false);

  return<Modl title={"🔗 Accès — "+eg.nom} onClose={onClose} wide>
    {eg.photo&&<div style={{textAlign:"center",marginBottom:11}}><img src={eg.photo} alt="" style={{width:64,height:64,borderRadius:12,objectFit:"cover",border:`2px solid ${C.gold}44`}}/></div>}
    <div style={{background:`${C.gold}0A`,border:`1px solid ${C.gold}33`,borderRadius:12,padding:15,marginBottom:14}}>

        {page==="conversions"&&<Conversions data={data} save={save} egNom={egNom}/>}
        {page==="comites"    &&<GroupLike data={data} save={save} field="comites" title="Comités" icon="📋" egNom={egNom}/>}
        {page==="ministeres" &&<GroupLike data={data} save={save} field="ministeres" title="Ministères" icon="🎵" egNom={egNom}/>}
        {page==="groupes"    &&<GroupLike data={data} save={save} field="groupes" title="Groupes" icon="⬡" egNom={egNom}/>}

function GestionEglises({cfg,saveCfg,openLien}){
  const[modal,setModal]=useState(false);
  const[editEg,setEditEg]=useState(null);
  const[form,setF]=useState({});
  const[lienAuto,setLienAuto]=useState(null);

  const setField=useCallback(e=>setF(p=>({...p,[e.target.name]:e.target.value})),[]);
  const upPhoto=useCallback(e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>setF(p=>({...p,photo:ev.target.result}));
    r.readAsDataURL(file);
  },[]);
  const genPass=useCallback(()=>setF(p=>({...p,password:genPw()})),[]);
  const removePhoto=useCallback(()=>setF(p=>({...p,photo:""})),[]);

  const creer=async()=>{
    if(!form.nom)return alert("Le nom est obligatoire.");
    const id=uid();const pw=form.password||genPw();
    const eg={id,nom:form.nom,ville:form.ville||"",responsable:form.responsable||"",
      contact:form.contact||"",password:pw,dateCree:new Date().toLocaleDateString("fr-FR"),
      adresse:form.adresse||"",telephone:form.telephone||"",email:form.email||"",photo:form.photo||""};
    await saveCfg({...cfg,eglises:[...cfg.eglises,eg]});
    await fSet("eglises/"+id+"/data",egVide(form.nom));
    setModal(false);setF({});setLienAuto(eg);
  };
  const modifier=async()=>{
    await saveCfg({...cfg,eglises:cfg.eglises.map(e=>e.id===editEg.id?{...e,...form}:e)});
    setEditEg(null);setF({});
  };
  const suppr=async id=>{
    if(!window.confirm("Supprimer cette église et toutes ses données ?"))return;
    await saveCfg({...cfg,eglises:cfg.eglises.filter(e=>e.id!==id)});
    await fDel("eglises/"+id);
  };

  return <div>
    {lienAuto&&<ModalLien eg={lienAuto} onClose={()=>setLienAuto(null)}/>}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <SH>Gestion des Églises</SH>
      <Btn onClick={()=>{setF({password:genPw()});setModal(true);}}>+ Enregistrer une église</Btn>
    </div>
    {cfg.eglises.length===0&&<Card style={{padding:32,textAlign:"center"}}>
      <div style={{fontSize:38,marginBottom:10}}>⛪</div>
      <div style={{color:C.gray,marginBottom:14,fontSize:11}}>Aucune église enregistrée</div>
      <Btn onClick={()=>{setF({password:genPw()});setModal(true);}}>Enregistrer la première église</Btn>
    </Card>}
    <div style={{display:"grid",gap:10}}>
      {cfg.eglises.map(eg=>(
        <Card key={eg.id} style={{padding:"14px 18px"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
            {eg.photo
              ?<img src={eg.photo} alt="" style={{width:46,height:46,borderRadius:9,objectFit:"cover",border:`2px solid ${C.gold}44`,flexShrink:0}}/>
              :<div style={{width:46,height:46,borderRadius:9,background:`linear-gradient(135deg,${C.gD},${C.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>⛪</div>
            }
            <div style={{flex:1,minWidth:140}}>
              <div style={{fontWeight:800,fontSize:13,color:C.gold}}>{eg.nom}</div>
              <div style={{fontSize:9,color:C.gray,marginTop:2}}>{eg.ville} {eg.responsable?"· "+eg.responsable:""} · {eg.dateCree}</div>
              <div style={{marginTop:5,display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                <span style={{fontSize:8,color:C.gray}}>Code :</span>
                <span style={{fontSize:12,color:C.gold,fontWeight:800,background:`${C.gold}14`,padding:"1px 10px",borderRadius:20,letterSpacing:2}}>{eg.password}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              <Btn onClick={()=>openLien(eg)} v="gold" sm>🔗 Lien & Code</Btn>
              <button onClick={()=>{setEditEg(eg);setF({...eg});}} style={{padding:"4px 8px",background:`${C.gold}14`,border:`1px solid ${C.gold}44`,borderRadius:6,color:C.gold,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>✏</button>
              <button onClick={()=>suppr(eg.id)} style={{padding:"4px 8px",background:`${C.err}14`,border:`1px solid ${C.err}44`,borderRadius:6,color:C.err,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>🗑</button>
            </div>
          </div>
        </Card>
      ))}
    </div>
    {modal&&<Modl title="Enregistrer une Église" onClose={()=>setModal(false)} wide>
      <FormulaireEglise form={form} setField={setField} upPhoto={upPhoto} genPass={genPass} removePhoto={removePhoto}/>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <Btn onClick={creer}>✓ ENREGISTRER & GÉNÉRER LE LIEN</Btn>
        <Btn onClick={()=>setModal(false)} v="outline">ANNULER</Btn>
      </div>
    </Modl>}
    {editEg&&<Modl title="Modifier l'Église" sub={editEg.nom} onClose={()=>setEditEg(null)} wide>
      <FormulaireEglise form={form} setField={setField} upPhoto={upPhoto} genPass={genPass} removePhoto={removePhoto}/>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <Btn onClick={modifier}>✓ ENREGISTRER</Btn>
        <Btn onClick={()=>setEditEg(null)} v="outline">ANNULER</Btn>
      </div>
    </Modl>}
  </div>;
}

        <div style={{fontSize:8,color:C.gray,letterSpacing:2.5,marginBottom:2}}>LES ÉGLISES DE DIEU</div>
        <div style={{fontSize:12,fontWeight:800,color:C.gold,letterSpacing:2,marginBottom:4}}>SALEM</div>
        <div style={{fontSize:7,color:C.gD,background:`${C.gold}18`,borderRadius:20,padding:"2px 8px",display:"inline-block",letterSpacing:1,marginBottom:6}}>SYSTÈME MÈRE · v{VER}</div>
        <div><CB online={online}/></div>
      </div>
      <nav style={{flex:1,overflowY:"auto",padding:"5px 4px"}}>
        {NAV_M.map(n=><button key={n.id} onClick={()=>goTo(n.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:7,padding:"7px 8px",marginBottom:1,background:page===n.id&&!egVue?`${C.gold}18`:"transparent",border:page===n.id&&!egVue?`1px solid ${C.gold}44`:"1px solid transparent",borderRadius:7,color:page===n.id&&!egVue?C.gold:C.gray,cursor:"pointer",fontSize:11,fontWeight:page===n.id&&!egVue?700:400,fontFamily:"inherit",textAlign:"left"}}><span style={{fontSize:11,flexShrink:0}}>{n.ic}</span><span>{n.l}</span></button>)}
        {cfg.eglises.length>0&&<><div style={{padding:"7px 8px 3px",fontSize:7,color:C.gD,letterSpacing:1.5,fontWeight:700}}>ACCÈS DIRECT</div>
        {cfg.eglises.map(eg=><button key={eg.id} onClick={()=>{setEgVue(eg);if(mob)setMenu(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:6,padding:"5px 8px",marginBottom:1,background:egVue?.id===eg.id?`${C.blue}18`:"transparent",border:egVue?.id===eg.id?`1px solid ${C.blue}44`:"1px solid transparent",borderRadius:7,color:egVue?.id===eg.id?C.blue:C.gray,cursor:"pointer",fontSize:10,fontWeight:egVue?.id===eg.id?700:400,fontFamily:"inherit",textAlign:"left"}}>
          {eg.photo?<img src={eg.photo} alt="" style={{width:15,height:15,borderRadius:3,objectFit:"cover",flexShrink:0}}/>:<span style={{flexShrink:0,fontSize:10}}>⛪</span>}
          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{eg.nom}</span>
        </button>)}</>}
      </nav>
      <div style={{padding:"4px 4px",borderTop:`1px solid ${C.gold}11`}}>
        <button onClick={()=>setCp(true)} style={{width:"100%",padding:"5px 8px",marginBottom:3,borderRadius:7,background:"transparent",border:`1px solid ${C.gold}33`,color:C.gold,cursor:"pointer",fontSize:8,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>🔑 Changer mot de passe</button>
        <button onClick={()=>window.location.reload()} style={{width:"100%",padding:"6px",borderRadius:7,background:"transparent",border:`1px solid ${C.err}44`,color:C.err,cursor:"pointer",fontSize:8,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>🚪 Se déconnecter</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
      {mob&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",borderBottom:`1px solid ${C.gold}22`,background:C.bg2,flexShrink:0}}><button onClick={()=>setMenu(o=>!o)} style={{background:"transparent",border:"none",color:C.gold,fontSize:17,cursor:"pointer"}}>☰</button><div style={{fontSize:10,fontWeight:800,color:C.gold,flex:1}}>Les Églises Salem — Système Mère</div><CB online={online}/></div>}
      <div style={{flex:1,padding:mob?"10px":"18px",overflowY:"auto"}}>
        {egVue?<SystEglise egId={egVue.id} egNom={egVue.nom} onBack={()=>setEgVue(null)} showCP={false}/>
        :page==="dashboard"?<DashMere cfg={cfg} allData={allData} online={online} onVoir={eg=>setEgVue(eg)} onCP={()=>setCp(true)} openLien={setLienM}/>
        :page==="eglises"?<GestionEglises cfg={cfg} saveCfg={saveCfg} openLien={setLienM}/>
        :page==="rapport"?<RapportGlobal cfg={cfg} allData={allData}/>
        :page==="carte"?<CarteHaiti cfg={cfg}/>
        :page==="parametres"?<Parametres cfg={cfg} saveCfg={saveCfg} setLienModal={setLienM} allData={allData}/>
        :null}
      </div>
    </div>
    {lienM&&<ModalLien eg={lienM} onClose={()=>setLienM(null)}/>}
    {cp&&<ChgPass actuel={cfg.password} onSave={async np=>{await saveCfg({...cfg,password:np});}} onClose={()=>setCp(false)}/>}
  </div>;
}

function AppRoot(){
  const[fbOk,setFbOk]=useState(!!window.__FB);const[mode,setMode]=useState(null);const[egCfg,setEgCfg]=useState(null);const[masterPw,setMasterPw]=useState(MPW);const[loading,setLoading]=useState(false);
  useEffect(()=>{if(fbOk)return;const h=()=>setFbOk(true);window.addEventListener("fb-ok",h);return()=>window.removeEventListener("fb-ok",h);},[fbOk]);
  useEffect(()=>{if(!fbOk)return;const params=new URLSearchParams(window.location.search);const egId=params.get("eglise");if(egId){setLoading(true);fGet("master").then(md=>{setMasterPw(md?.password||MPW);const eg=md?.eglises?.find(e=>e.id===egId);if(eg)setEgCfg(eg);setLoading(false);});}else{fGet("master/password").then(pw=>{if(pw)setMasterPw(pw);});}},[fbOk]);
  if(!fbOk||loading)return<Splash/>;
  if(egCfg){if(mode==="eglise")return<SystEglise egId={egCfg.id} egNom={egCfg.nom} onBack={()=>setMode(null)} showCP={true}/>;return<Login egCfg={egCfg} masterPw={null} onEglise={()=>setMode("eglise")} onMaster={null}/>;}
  if(mode==="master")return<AppMere/>;
  return<Login masterPw={masterPw} egCfg={null} onMaster={()=>setMode("master")} onEglise={null}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppRoot/>);
</script>
</body>
</html>
